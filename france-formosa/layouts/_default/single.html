{{ define "main" }}
<section class="page-hero">
    <div class="container">
        <div class="page-hero-content" data-reveal>
            <span class="overline">France Formosa</span>
            <h1>{{ .Title }}</h1>
            {{ with .Params.subtitle }}<p class="page-lead">{{ . }}</p>{{ end }}
        </div>
    </div>
</section>
<section class="page-body">
    <div class="container">
        <div class="prose" data-reveal>
            {{ .Content }}
        </div>
    </div>
</section>
{{ end }}

baseURL = "https://www.france-formosa.org/"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Français"
    contentDir = "content/fr"
    weight = 1
    title = "France Formosa"
    [languages.fr.params]
      description = "Association de diplomatie culturelle franco-taiwanaise"
      author = "France Formosa"

    [[languages.fr.menu.main]]
      name = "Accueil"
      url = "/"
      weight = 1
    [[languages.fr.menu.main]]
      name = "Notre mission"
      url = "/mission/"
      weight = 2
    [[languages.fr.menu.main]]
      name = "Nos axes"
      url = "/axes/"
      weight = 3
    [[languages.fr.menu.main]]
      name = "Publications"
      url = "/publications/"
      weight = 4
    [[languages.fr.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 5

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    title = "France Formosa"
    [languages.en.params]
      description = "Cultural diplomacy association between France and Taiwan"
      author = "France Formosa"

    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Our Mission"
      url = "/mission/"
      weight = 2
    [[languages.en.menu.main]]
      name = "Our Focus"
      url = "/axes/"
      weight = 3
    [[languages.en.menu.main]]
      name = "Publications"
      url = "/publications/"
      weight = 4
    [[languages.en.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 5

  [languages.zh]
    languageCode = "zh-TW"
    languageName = "繁體中文"
    contentDir = "content/zh"
    weight = 3
    title = "France Formosa — 法台文化外交協會"
    [languages.zh.params]
      description = "法台文化外交協會"
      author = "France Formosa"

    [[languages.zh.menu.main]]
      name = "首頁"
      url = "/"
      weight = 1
    [[languages.zh.menu.main]]
      name = "我們的使命"
      url = "/mission/"
      weight = 2
    [[languages.zh.menu.main]]
      name = "工作重點"
      url = "/axes/"
      weight = 3
    [[languages.zh.menu.main]]
      name = "出版物"
      url = "/publications/"
      weight = 4
    [[languages.zh.menu.main]]
      name = "聯絡我們"
      url = "/contact/"
      weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

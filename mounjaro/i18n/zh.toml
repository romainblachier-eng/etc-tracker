other = "什麼是 Mounjaro？"
[about_text_1]
other = "Mounjaro（替爾泊肽）是一種用於治療第二型糖尿病和體重管理的注射型藥物。它是一種 GIP 和 GLP-1 雙重受體促效劑。"
[about_text_2]
other = "由禮來公司開發的替爾泊肽在 SURPASS 和 SURMOUNT 臨床試驗中顯示了顯著的效果，在減重和降低糖化血色素（HbA1c）方面均優於現有治療方案。"

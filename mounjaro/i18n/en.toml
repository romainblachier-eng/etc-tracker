[section_about]
other = "What is Mounjaro?"
[about_text_1]
other = "Mounjaro (tirzepatide) is an injectable medication used for type 2 diabetes and weight management. It works as a dual GIP and GLP-1 receptor agonist."
[about_text_2]
other = "Developed by Eli Lilly, tirzepatide has shown significant results in the SURPASS and SURMOUNT clinical trials, with superior weight loss and HbA1c reductions compared to existing treatments."

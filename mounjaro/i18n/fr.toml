[section_about]
other = "Qu'est-ce que le Mounjaro ?"
[about_text_1]
other = "Le Mounjaro (tirzepatide) est un medicament injectable utilise dans le traitement du diabete de type 2 et la gestion du poids. Il agit comme un double agoniste des recepteurs GIP et GLP-1."
[about_text_2]
other = "Developpe par Eli Lilly, le tirzepatide a montre des resultats significatifs dans les etudes cliniques SURPASS et SURMOUNT, avec des reductions de poids et d'HbA1c superieures aux traitements existants."

baseURL = "https://mounjaro.info/"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    contentDir = "content/fr"
    weight = 1
    title = "Mounjaro Info — Actualites tirzepatide"
    [languages.fr.params]
      description = "Actualites et informations sur le Mounjaro (tirzepatide) — suivi quotidien par IA"
      author = "Mounjaro Info"

    [[languages.fr.menu.main]]
      name = "Accueil"
      url = "/"
      weight = 1
    [[languages.fr.menu.main]]
      name = "Actualites"
      url = "/articles/"
      weight = 2
    [[languages.fr.menu.main]]
      name = "A propos"
      url = "/a-propos/"
      weight = 3
    [[languages.fr.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 4

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    title = "Mounjaro Info — Tirzepatide News"
    [languages.en.params]
      description = "News and information about Mounjaro (tirzepatide) — daily AI-powered updates"
      author = "Mounjaro Info"

    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      name = "News"
      url = "/articles/"
      weight = 2
    [[languages.en.menu.main]]
      name = "About"
      url = "/about/"
      weight = 3
    [[languages.en.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 4

  [languages.zh]
    languageCode = "zh-TW"
    languageName = "繁體中文"
    contentDir = "content/zh"
    weight = 3
    title = "Mounjaro 資訊 — 替爾泊肽最新消息"
    [languages.zh.params]
      description = "Mounjaro（替爾泊肽）最新資訊 — AI 每日更新"
      author = "Mounjaro Info"

    [[languages.zh.menu.main]]
      name = "首頁"
      url = "/"
      weight = 1
    [[languages.zh.menu.main]]
      name = "最新消息"
      url = "/articles/"
      weight = 2
    [[languages.zh.menu.main]]
      name = "關於我們"
      url = "/a-propos/"
      weight = 3
    [[languages.zh.menu.main]]
      name = "聯絡我們"
      url = "/contact/"
      weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

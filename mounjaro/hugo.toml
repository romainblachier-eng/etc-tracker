baseURL = "https://mounjaronews.info/"
defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true

[languages]
  [languages.fr]
    languageCode = "fr-FR"
    languageName = "Francais"
    contentDir = "content/fr"
    weight = 1
    title = "mounjaro/news — Veille tirzepatide"
    [languages.fr.params]
      description = "Veille quotidienne sur la tirzepatide — actualite Mounjaro fiable et multilingue FR/EN"
      author = "mounjaro/news"

    [[languages.fr.menu.main]]
      name = "Accueil"
      url = "/"
      weight = 1
    [[languages.fr.menu.main]]
      name = "Articles"
      url = "/articles/"
      weight = 2
    [[languages.fr.menu.main]]
      name = "A propos"
      url = "/a-propos/"
      weight = 3
    [[languages.fr.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 4

  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    title = "mounjaro/news — Tirzepatide watch"
    [languages.en.params]
      description = "Daily tirzepatide watch — reliable, sourced, multilingual Mounjaro news"
      author = "mounjaro/news"

    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Articles"
      url = "/articles/"
      weight = 2
    [[languages.en.menu.main]]
      name = "About"
      url = "/about/"
      weight = 3
    [[languages.en.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 4

  [languages.zh]
    languageCode = "zh-TW"
    languageName = "繁體中文"
    contentDir = "content/zh"
    weight = 3
    title = "mounjaro/news — 替爾泊肽每日觀察"
    [languages.zh.params]
      description = "Mounjaro（替爾泊肽）每日觀察 — 可靠、多語來源"
      author = "mounjaro/news"

    [[languages.zh.menu.main]]
      name = "首頁"
      url = "/"
      weight = 1
    [[languages.zh.menu.main]]
      name = "文章"
      url = "/articles/"
      weight = 2
    [[languages.zh.menu.main]]
      name = "關於我們"
      url = "/a-propos/"
      weight = 3
    [[languages.zh.menu.main]]
      name = "聯絡我們"
      url = "/contact/"
      weight = 4

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

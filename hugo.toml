baseURL = "https://ethereumclassic.work/"
languageCode = "fr-FR"
title = "ETC Tracker"
defaultContentLanguage = "fr"
theme = "PaperMod"

[params]
  description = "Suivi quotidien du cours de l'Ethereum Classic avec analyse IA"
  author = "ETC Tracker"
  beehiiv_embed_url = "https://subscribe-forms.beehiiv.com/cef8f235-9fb0-41cc-bd8d-2d5be27cb4df"
  google_adsense_id = ""
  coinzilla_zone_id = ""

  # PaperMod params
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  disableSpecial1stPost = true

  [params.homeInfoParams]
    Title = "ETC Tracker"
    Content = "Suivi quotidien du cours de l'Ethereum Classic avec analyse IA"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[params.label]
  text = "ETC Tracker"
  icon = ""
  iconHeight = 35

[[menu.main]]
  identifier = "accueil"
  name = "Accueil"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "analyses"
  name = "Analyses"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "newsletter"
  name = "Newsletter"
  url = "/#newsletter"
  weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  filename   = "sitemap.xml"
  priority   = 0.5

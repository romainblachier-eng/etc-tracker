baseURL = "https://ethereumclassic.work/"
languageCode = "fr-FR"
title = "ETC Tracker"
defaultContentLanguage = "fr"
enableRobotsTXT = true
paginate = 15

[params]
  description = "Suivi quotidien du cours Ethereum Classic (ETC) avec analyse IA"
  author = "ETC Tracker"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Accueil"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "Cours ETC"
    url = "/posts/"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]

<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Not Found</title>
    <link rel="stylesheet" href="{{ `css/style.css` | relURL }}">
</head>
<body>
    <div class="wrapper">
        <div class="container" style="padding: 80px 24px; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 20px;">❌</div>
            <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; color: var(--text);">Page non trouvée</h1>
            <p style="color: var(--text-muted); max-width: 400px; margin: 0 auto; font-size: 0.95rem;">La page que vous cherchez n'existe pas ou a été supprimée.</p>
            <a href="{{ `/ ` | relURL }}" style="display: inline-block; margin-top: 24px; padding: 12px 28px; background: linear-gradient(135deg, var(--accent), var(--cyan)); color: var(--bg); font-weight: 700; border-radius: 12px; text-decoration: none;">Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>

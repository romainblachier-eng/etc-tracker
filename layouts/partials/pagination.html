{{- if or .Paginator.HasPrev .Paginator.HasNext }}
<nav class="pagination" aria-label="Pagination">
  {{- if .Paginator.HasPrev }}
    <a href="{{ .Paginator.Prev.URL }}" class="pagination-prev">← Précédent</a>
  {{- end }}

  {{- range .Paginator.Pagers }}
    {{- if eq . $.Paginator }}
      <span class="pagination-current" aria-current="page">{{ .PageNumber }}</span>
    {{- else }}
      <a href="{{ .URL }}" class="pagination-link">{{ .PageNumber }}</a>
    {{- end }}
  {{- end }}

  {{- if .Paginator.HasNext }}
    <a href="{{ .Paginator.Next.URL }}" class="pagination-next">Suivant →</a>
  {{- end }}
</nav>
{{- end }}

{{ define "main" }}
<section class="page-hero">
    <div class="container">
        <h1>{{ .Title }}</h1>
        <p class="page-subtitle">{{ .Params.subtitle }}</p>
    </div>
</section>
<section class="contact-section">
    <div class="container">
        <div class="contact-grid">
            <div class="contact-info">
                <h3>Restons en contact</h3>
                <p>Vous souhaitez en savoir plus sur nos activités, proposer un partenariat ou rejoindre notre réseau ? N'hésitez pas à nous écrire.</p>
                <div class="contact-details">
                    <div class="contact-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="20" height="20"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                        <span>Paris, France</span>
                    </div>
                </div>
            </div>
            <div class="contact-form-wrapper">
                <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
                    <input type="hidden" name="form-name" value="contact">
                    <p class="hidden" style="display:none">
                        <label>Ne pas remplir : <input name="bot-field"></label>
                    </p>
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" required placeholder="Votre nom">
                    </div>
                    <div class="form-group">
                        <label for="email">Adresse e-mail</label>
                        <input type="email" id="email" name="email" required placeholder="votre@email.com">
                    </div>
                    <div class="form-group">
                        <label for="organization">Organisation</label>
                        <input type="text" id="organization" name="organization" placeholder="Votre organisation (optionnel)">
                    </div>
                    <div class="form-group">
                        <label for="subject">Objet</label>
                        <select id="subject" name="subject" required>
                            <option value="">Sélectionnez un sujet</option>
                            <option value="partenariat">Proposition de partenariat</option>
                            <option value="adhesion">Adhésion</option>
                            <option value="evenement">Événements</option>
                            <option value="presse">Presse & Médias</option>
                            <option value="autre">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required placeholder="Votre message..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Envoyer le message</button>
                </form>
            </div>
        </div>
    </div>
</section>
{{ end }}

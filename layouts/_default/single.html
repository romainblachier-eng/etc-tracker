{{ define "main" }}
<article class="post">
    <header class="post-header" data-reveal>
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time>
            <span class="tag">ETC</span>
        </div>
    </header>
    <div class="post-content" data-reveal>
        {{ .Content }}
    </div>
    <nav class="post-nav" data-reveal>
        {{ with .PrevInSection }}<a href="{{ .Permalink }}">&larr; {{ .Title }}</a>{{ end }}
        <span></span>
        {{ with .NextInSection }}<a href="{{ .Permalink }}">{{ .Title }} &rarr;</a>{{ end }}
    </nav>
</article>
{{ end }}

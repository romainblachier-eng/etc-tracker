{{ define "main" }}
<section class="page-hero">
    <div class="container">
        <h1>{{ .Title }}</h1>
        {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
    </div>
</section>
<section class="page-content">
    <div class="container container-narrow">
        {{ .Content }}
    </div>
</section>
{{ end }}
